name: Build debug APK

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: sdkmanager "platforms;android-36.1" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest debug APK release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
          APK_PATH: app/build/outputs/apk/debug/app-debug.apk
        run: |
          if gh release view latest-debug > /dev/null 2>&1; then
            gh release upload latest-debug "$APK_PATH#app-debug.apk" --clobber
            gh release edit latest-debug \
              --title "Latest debug APK" \
              --notes "Automatically built from commit $GITHUB_SHA."
          else
            gh release create latest-debug "$APK_PATH#app-debug.apk" \
              --target "$GITHUB_SHA" \
              --title "Latest debug APK" \
              --notes "Automatically built from commit $GITHUB_SHA." \
              --prerelease
          fi
